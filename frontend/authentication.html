<!DOCTYPE html>
<html>

<head>
  <title>Authentication</title>
  <link rel="stylesheet" href="styles/pages/authentication.css">
</head>

<body>

  <div class="auth-container">

    <div class="toggle-tabs">
      <button class="tab active" onclick="showForm('login')">Login</button>
      <button class="tab" onclick="showForm('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
      <h2>Login</h2>
      <input type="email" id="loginEmail" placeholder="Email" required>
      <input type="password" id="loginPassword" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>

    <!-- Register Form -->
    <form id="registerForm">
      <h2>Create Account</h2>
      <input type="text" id="regName" placeholder="Full Name" required>
      <input type="email" id="regEmail" placeholder="Email" required>
      <input type="password" id="regPassword" placeholder="Password" required>
      <button type="submit">Register</button>
    </form>

    <p id="message"></p>

  </div>

  <script>
    function showForm(type) {
      const tabs = document.querySelectorAll('.tab');
      const loginForm = document.getElementById('loginForm');
      const registerForm = document.getElementById('registerForm');

      tabs.forEach(t => t.classList.remove('active'));

      if (type === 'login') {
        loginForm.style.display = 'block';
        registerForm.style.display = 'none';
        tabs[0].classList.add('active');
      } else {
        loginForm.style.display = 'none';
        registerForm.style.display = 'block';
        tabs[1].classList.add('active');
      }
    }

    showForm('login');
  </script>
  <script type="module" src="scripts/authentication.js"></script>

</body>

</html>
