<!DOCTYPE html>
<html>

<head>
  <title>Checkout</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/site-header.css">
  <link rel="stylesheet" href="styles/pages/checkout.css">
</head>

<body>

  <!-- ===== CHECKOUT HEADER ===== -->
  <div class="site-header">
    <div class="site-header-left-section">
      <a class="header-link" href="home.html">
        <!-- Desktop Logo -->
        <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
          <rect x="0" y="4" width="28" height="28" rx="6" fill="#ffffff" />
          <path d="M7 18 L14 11 L21 18 L14 25 Z" fill="#000000" />
          <text x="34" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700"
            fill="#ffffff">Milzio</text>
        </svg>
        <!-- Mobile Logo -->
        <svg class="site-mobile-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
          <rect width="36" height="36" rx="8" fill="#ffffff" />
          <path d="M8 18 L18 8 L28 18 L18 28 Z" fill="#000000" />
        </svg>
      </a>
    </div>

    <div class="site-header-middle-section js-checkout-header-middle-section"
      style="justify-content: center; font-size: 25px; font-weight: 500; color: #ffffff;">
      Checkout (<a class="return-to-home-link" href="index.html" style="color: #aaaaaa; font-size: 23px; text-decoration: none; cursor: pointer;
               transition: color 0.2s ease;"
        onmouseover="this.style.color='#ffffff'; this.style.textDecoration='underline';"
        onmouseout="this.style.color='#aaaaaa'; this.style.textDecoration='none';"></a>)
    </div>

    <div class="site-header-right-section">
      <!-- Lock / Secure Icon -->
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#ffffff"
        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
        <path d="M7 11V7a5 5 0 0 1 10 0v4" />
      </svg>
    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">
    <div class="page-title">Review your order</div>

    <div class="checkout-grid">
      <div class="order-summary js-order-summury">
      </div>

      <div class="payment-summary js-payment-summary">
      </div>
    </div>
  </div>

  <script type="module" src="scripts/checkout.js"></script>
</body>

</html>
