<!DOCTYPE html>
<html>

<head>
  <title>Milzio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/site-header.css">
  <link rel="stylesheet" href="styles/pages/home.css">
</head>

<body>
  <div class="site-header">

    <div class="site-header-left-section">
      <a href="home.html" class="header-link">
        <!-- Desktop Logo -->
        <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
          <rect x="0" y="4" width="28" height="28" rx="6" fill="#2563eb" />
          <path d="M7 18 L14 11 L21 18 L14 25 Z" fill="#ffffff" />
          <text x="34" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700"
            fill="#ffffff">Milzio</text>
        </svg>
        <!-- Mobile Logo -->
        <svg class="site-mobile-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
          <rect width="36" height="36" rx="8" fill="#2563eb" />
          <path d="M8 18 L18 8 L28 18 L18 28 Z" fill="#ffffff" />
        </svg>
      </a>
    </div>

    <div class="site-header-middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </button>
    </div>

    <div class="site-header-right-section">
      <a class="orders-link header-link" href="orders.html">
        <span class="returns-text">Returns</span>
        <span class="orders-text">& Orders</span>
      </a>

      <a class="cart-link header-link" href="checkout.html">
        <img class="cart-icon" src="images/icons/cart-icon.png" alt="Cart">
        <div class="cart-quantity js-cart-quantity"></div>
        <div class="cart-text">Cart</div>
      </a>

    </div>

  </div>

  <div class="main">
    <div class="products-grid js-products-grid"></div>
  </div>

  <script type="module" src="scripts/home.js"></script>
</body>

</html>
