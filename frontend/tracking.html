<!DOCTYPE html>
<html>

<head>
  <title>Track Order</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/shared/site-header.css">
  <link rel="stylesheet" href="styles/pages/tracking.css">
</head>

<body>

  <!-- ===== HEADER ===== -->
  <div class="site-header">

    <div class="site-header-left-section">
      <a href="home.html" class="header-link">
        <!-- Desktop Logo -->
        <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
          <rect x="0" y="4" width="28" height="28" rx="6" fill="#2563eb" />
          <path d="M7 18 L14 11 L21 18 L14 25 Z" fill="#ffffff" />
          <text x="34" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700"
            fill="#ffffff">Milzio</text>
        </svg>
        <!-- Mobile Logo -->
        <svg class="site-mobile-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
          <rect width="36" height="36" rx="8" fill="#2563eb" />
          <path d="M8 18 L18 8 L28 18 L18 28 Z" fill="#ffffff" />
        </svg>
      </a>
    </div>

    <div class="site-header-middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="22" height="22"
          fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7" />
          <line x1="16.5" y1="16.5" x2="22" y2="22" />
        </svg>
      </button>
    </div>

    <div class="site-header-right-section">
      <a class="orders-link header-link" href="orders.html">
        <span class="returns-text">Returns</span>
        <span class="orders-text">& Orders</span>
      </a>
      <a class="cart-link header-link" href="checkout.html">
        <svg class="cart-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 50 40" width="50" height="40" fill="none"
          stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 4h4l5 18h18l4-12H13" stroke="#ffffff" />
          <circle cx="21" cy="26" r="2.5" fill="#ffffff" stroke="none" />
          <circle cx="33" cy="26" r="2.5" fill="#ffffff" stroke="none" />
        </svg>
        <div class="cart-quantity">3</div>
        <div class="cart-text">Cart</div>
      </a>
    </div>

  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">
    <div class="order-tracking">

      <a class="back-to-orders-link link-primary" href="orders.html">
        View all orders
      </a>

      <div class="delivery-date">
        Arriving on Monday, June 13
      </div>

      <div class="product-info">
        Black and Gray Athletic Cotton Socks - 6 Pairs
      </div>

      <div class="product-info">
        Quantity: 1
      </div>

      <img class="product-image" src="images/products/athletic-cotton-socks-6-pairs.jpg"
        alt="Black and Gray Athletic Cotton Socks">

      <div class="progress-labels-container">
        <div class="progress-label">Preparing</div>
        <div class="progress-label current-status">Shipped</div>
        <div class="progress-label">Delivered</div>
      </div>

      <div class="progress-bar-container">
        <div class="progress-bar"></div>
      </div>

    </div>
  </div>

  <script>
    const url = new URL(window.location.href);
    console.log(url.searchParams.get('orderId'));
    console.log(url.searchParams.get('productId'));
  </script>

</body>

</html>
