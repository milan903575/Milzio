<!DOCTYPE html>
<html>

<head>
  <title>Checkout</title>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/shared/general.css">
  <link rel="stylesheet" href="styles/pages/checkout/checkout-header.css">
  <link rel="stylesheet" href="styles/pages/checkout/checkout.css">
</head>

<body>

  <!-- ===== CHECKOUT HEADER ===== -->
  <div class="checkout-header">
    <div class="header-content">

      <div class="checkout-header-left-section">
        <a href="home.html">
          <!-- Desktop Logo -->
          <svg class="site-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 36" width="120" height="36">
            <rect x="0" y="4" width="28" height="28" rx="6" fill="#2563eb" />
            <path d="M7 18 L14 11 L21 18 L14 25 Z" fill="#ffffff" />
            <text x="34" y="25" font-family="Arial, sans-serif" font-size="16" font-weight="700"
              fill="#ffffff">Milzio</text>
          </svg>
          <!-- Mobile Logo -->
          <svg class="site-mobile-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
            <rect width="36" height="36" rx="8" fill="#2563eb" />
            <path d="M8 18 L18 8 L28 18 L18 28 Z" fill="#ffffff" />
          </svg>
        </a>
      </div>

      <div class="checkout-header-middle-section js-checkout-header-middle-section">
        Checkout (<a class="return-to-home-link" href="index.html"></a>)
      </div>

      <div class="checkout-header-right-section">
        <!-- Lock / Secure Icon -->
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="#1e3a5f"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>

    </div>
  </div>

  <!-- ===== MAIN CONTENT ===== -->
  <div class="main">
    <div class="page-title">Review your order</div>

    <div class="checkout-grid">
      <div class="order-summary js-order-summury">
      </div>

      <div class="payment-summary js-payment-summary">
      </div>
    </div>
  </div>

  <script type="module" src="scripts/checkout.js"></script>
</body>

</html>
